name = "macaudio"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# --- D1: catalog + transcripts ----------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "macaudio"
database_id = "30407f97-19be-4f17-921e-8c8f4ece4a06"
migrations_dir = "db/migrations"

# --- R2: audio files --------------------------------------------------------
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "macaudio"

# --- KV: required by the Astro Cloudflare adapter for SSR sessions ----------
[[kv_namespaces]]
binding = "SESSION"
id = "e365a9a645a44b05a9c084468e18b245"          # namespace "MACAUDIO"

[vars]
SITE_NAME = "Michael Coughlin — Audio"
SITE_SHORT_NAME = "MC Audio"
SITE_URL = "https://teaching.michaelcoughlin.net"           # Astro site (Pages custom domain)
MEDIA_BASE_URL = "https://audio.michaelcoughlin.net"        # R2 audio files (bucket custom domain)
